# Local development only — not production
# Copy deploy/.env.example → deploy/.env and fill in credentials before running.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aisat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — see deploy/.env.example}
      POSTGRES_DB: aisat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aisat} -d aisat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  redis:
    image: redis:7-alpine
    # volatile-lru: only evicts keys that have a TTL set.
    # Session tokens and credit-balance keys must NOT have a TTL so they are
    # never silently evicted. Expendable cache entries (semantic cache, rate
    # counters) must be written with an explicit EXPIRE to be eligible.
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy volatile-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  qdrant:
    image: qdrant/qdrant:v1.12.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - default

  nats:
    image: nats:2.10-alpine
    command: >
      --jetstream
      --store_dir /data
      --max_payload 8MB
    ports:
      - "4222:4222"
      # Bind monitoring to localhost only — exposes JetStream stream/consumer metadata
      - "127.0.0.1:8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set — see deploy/.env.example}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set — see deploy/.env.example}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - default

  casdoor:
    image: casbin/casdoor:v1.826.0
    ports:
      - "8088:8000"
    environment:
      RUNNING_IN_DOCKER: "true"
    volumes:
      - ./casdoor/app.conf:/conf/app.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
      casdoor:
        condition: service_healthy
    networks:
      - default

networks:
  default:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  nats_data:
  minio_data:
  caddy_data:
  caddy_config:
